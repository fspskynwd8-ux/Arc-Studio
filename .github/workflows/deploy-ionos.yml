name: 🚀 Deploy → IONOS arc-studio.org

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Manueller Start per Knopfdruck möglich

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: FTP Upload zu IONOS

    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      - name: 🚀 Dateien via FTP zu IONOS hochladen
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IONOS_FTP_HOST }}
          username: ${{ secrets.IONOS_FTP_USER }}
          password: ${{ secrets.IONOS_FTP_PASS }}
          server-dir: /
          # Nur relevante Dateien hochladen
          include: |
            **/*.html
            **/.htaccess
            **/pwa/**
          # Diese Dateien NIE hochladen
          exclude: |
            **/.git/**
            **/.github/**
            **/.DS_Store
            **/deploy-ionos.sh
            **/.env*
            **/.ionos.yaml
            **/BACKUP*
